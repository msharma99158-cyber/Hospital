<!doctype html>
<html lang="en" dir="ltr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    >

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <title>{% block title %}City Care Hospital{% endblock %}</title>
</head>

<body class="{% block body_class %}{% endblock %}">

<!-- Header -->


<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid">

        <a class="navbar-brand" href="{{ url_for('home') }}">
            City Care
        </a>

        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('home') }}">Home</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('about') }}">About</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('services') }}">Services</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('contact') }}">Contact</a>
                </li>

            </ul>
        </div>

    </div>
</nav>

<!-- Page Content -->
<main class="container mt-4">
    {% block content %}{% endblock %}
</main>

<!-- Footer -->
<footer class="footer mt-5">
    <div class="container">
        <div class="row text-center text-md-start">

            <div class="col-md-4 mb-3">
                <h5>City Care Hospital</h5>
                <p>Your health is our top priority.</p>
            </div>

            <div class="col-md-4 mb-3">
                <h5>Emergency</h5>
                <p>📞 108 / 112</p>
                <p>Available 24×7</p>
            </div>

            <div class="col-md-4 mb-3">
                <h5>Contact</h5>
                <p>Email: citycare@gmail.com</p>
                <p>Amritsar, Punjab</p>
            </div>

        </div>

        <hr class="footer-line">

        <p class="text-center mb-0">
            © 2026 City Care Hospital | All Rights Reserved
        </p>
    </div>
</footer>

<!-- Bootstrap JS -->
<script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>

</body>
</html>
